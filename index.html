<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hodei-client</title>

  <style>
    article {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    body {
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      padding: 20px;
      gap: 16px;
      overflow: hidden;
    }

    #controls>ul {
      max-width: 400px;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;

      button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>

<body>
  <section id="buttons">
    <article id="controls">
      <header>Controls</header>
      <ul>
        <button type="button" id="connect">[C]onnect</button>
        <button type="button" id="signTx">sign [T]x</button>
        <button type="button" id="delegate">dele[G]ate</button>
        <button type="button" id="signDataStake">sign data [S]take</button>
        <button type="button" id="signDataPayment">sign data [P]ayment</button>
        <button type="button" id="hang">[H]ang</button>
        <button type="button" id="debug">de[B]ug</button>
        <button type="button" id="disconnect">[D]isconnect</button>
        <button type="button" id="unlink">[U]nlink</button>
      </ul>
    </article>
  </section>
  <section id="state">
    <article>
      <header>State</header>
      <pre id="walletState">{<br> "status": "disconnected"<br>}</pre>
    </article>
  </section>
  <script type="module" src="/src/dev.ts"></script>
</body>

<style>
  @media (prefers-color-scheme: dark) {
    :root {
      background-color: #1a1a1a;
      color: #fff;
    }

    button {
      background-color: #333;
      color: #fff;
    }
  }

  button {
    position: relative;
  }

  dialog {
    position: fixed;
    top: 0;
    background-color: pink;
    z-index: 9999;
  }
</style>

</html>
